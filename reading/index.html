const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function groupBySubsection(papers) {
  const groups = new Map();
  for (const p of papers) {
    const key = p.subsection || '';
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(p);
  }
  return Array.from(groups.entries()).map(([name, papers]) => ({ name, papers }));
}
function paperLinks(p) {
  const out = [];
  if (p.arxiv) out.push({ name: 'arXiv', url: p.arxiv });
  if (p.doi)   out.push({ name: 'DOI',   url: p.doi });
  if (p.pdf)   out.push({ name: 'pdf on iPad', url: p.pdf });
  return out;
}
function renderPaper(p, context) {
  const meta  = [p.authors, p.year].filter(Boolean).join(', ');
  const links = paperLinks(p);
  return `
    <div class="paper${p.done ? ' read' : ''}">
      <div class="paper-line">
        <div class="paper-check${p.done ? ' checked' : ''}"></div>
        <div class="paper-body">
          ${context ? `<div class="search-result-folder">${esc(context)}</div>` : ''}
          <div class="paper-title">${esc(p.title)}</div>
          ${meta   ? `<div class="paper-meta">${esc(meta)}</div>` : ''}
          ${links.length ? `<div class="paper-links">${links.map(l => `<a href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.name)} ↗</a>`).join('')}</div>` : ''}
          ${p.note ? `<div class="paper-note">${esc(p.note)}</div>` : ''}
        </div>
      </div>
    </div>`;
}
function renderPaperList(papers) {
  if (!papers.length) return '<div class="state">No papers yet.</div>';
  return groupBySubsection(papers).map(g => `
    <section class="subsection">
      ${g.name ? `<h3 class="subsection-title">${esc(g.name)}</h3>` : ''}
      ${g.papers.map(p => renderPaper(p)).join('')}
    </section>`).join('');
}
function renderStats() {
  const total = PAPERS.length;
  const read  = PAPERS.filter(p => p.done).length;
  document.getElementById('page-stats').textContent = `${read}/${total} read · ${SECTIONS.length} sections`;
}
function renderOverview() {
  const html = `<div class="section-list">${SECTIONS.map(section => {
    const papers   = papersInSection(section);
    const total    = papers.length;
    const read     = papers.filter(p => p.done).length;
    const dotCount = Math.min(Math.max(total, 1), 20);
    const dotsRead = total === 0 ? 0 : Math.round((read / total) * dotCount);
    let dots = '';
    for (let k = 0; k < dotCount; k++) dots += `<span class="progress-dot${k < dotsRead ? ' read' : ''}"></span>`;
    return `
      <div class="section-row" data-section="${esc(section.name)}">
        <div class="section-name">${esc(section.name)}</div>
        <div class="section-progress">${dots}</div>
        <div class="section-count">${read}/${total}</div>
      </div>`;
  }).join('')}</div>`;
  const c = document.getElementById('content');
  c.innerHTML = html;
  c.querySelectorAll('.section-row').forEach(row =>
    row.addEventListener('click', () => showSection(row.dataset.section))
  );
}
function showSection(sectionName) {
  const section = SECTIONS.find(s => s.name === sectionName);
  if (!section) return;
  if (section.folders.length === 1) { showFolder(section.folders[0], sectionName); return; }
  const allPapers = papersInSection(section);
  const read = allPapers.filter(p => p.done).length;
  const html = `
    <div class="nav-header">
      <button class="back-btn" id="back-btn">← all sections</button>
      <div class="nav-title-block"><h2 class="nav-title">${esc(section.name)}</h2></div>
      <div class="nav-stats">${read}/${allPapers.length}</div>
    </div>
    <div class="folder-list">
      ${section.folders.map(folderName => {
        const fp = papersInFolder(folderName);
        const fr = fp.filter(p => p.done).length;
        return `<div class="folder-row" data-folder="${esc(folderName)}" data-section="${esc(sectionName)}">
          <div class="folder-name">${esc(folderName)}</div>
          <div class="folder-count">${fr}/${fp.length}</div>
        </div>`;
      }).join('')}
    </div>`;
  const c = document.getElementById('content');
  c.innerHTML = html;
  document.getElementById('back-btn').addEventListener('click', () => {
    document.getElementById('search-input').value = '';
    renderOverview();
  });
  c.querySelectorAll('.folder-row').forEach(row =>
    row.addEventListener('click', () => showFolder(row.dataset.folder, row.dataset.section))
  );
  window.scrollTo(0, 0);
}
function showFolder(folderName, sectionName) {
  const papers      = papersInFolder(folderName);
  const read        = papers.filter(p => p.done).length;
  const section     = SECTIONS.find(s => s.name === sectionName);
  const multiFolder = section && section.folders.length > 1;
  const html = `
    <div class="nav-header">
      <button class="back-btn" id="back-btn">← ${multiFolder ? esc(sectionName) : 'all sections'}</button>
      <div class="nav-title-block">
        ${multiFolder ? `<div class="nav-breadcrumb">${esc(sectionName)}</div>` : ''}
        <h2 class="nav-title">${esc(folderName)}</h2>
      </div>
      <div class="nav-stats">${read}/${papers.length}</div>
    </div>
    ${renderPaperList(papers)}`;
  const c = document.getElementById('content');
  c.innerHTML = html;
  document.getElementById('back-btn').addEventListener('click', () => {
    if (multiFolder) showSection(sectionName);
    else { document.getElementById('search-input').value = ''; renderOverview(); }
  });
  window.scrollTo(0, 0);
}
function renderSearch(q) {
  const ql = q.toLowerCase();
  const results = PAPERS.filter(p =>
    [p.title, p.authors, p.note, p.folder, p.subsection].filter(Boolean).join(' ').toLowerCase().includes(ql)
  );
  document.getElementById('content').innerHTML = `
    <div class="search-meta">${results.length} result${results.length === 1 ? '' : 's'} for "${esc(q)}"</div>
    ${results.map(p => renderPaper(p, p.subsection ? `${p.folder} / ${p.subsection}` : p.folder)).join('')}`;
}
document.getElementById('search-input').addEventListener('input', e => {
  const q = e.target.value.trim();
  if (!q) renderOverview(); else renderSearch(q);
});
renderStats();
renderOverview();
</script>
</body>
</html>
