const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const papersInFolder = folder => PAPERS.filter(p => p.folder === folder);

function groupBySubsection(papers) {
  const groups = new Map();
  for (const p of papers) {
    const key = p.subsection || '';
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(p);
  }
  return Array.from(groups.entries()).map(([name, papers]) => ({ name, papers }));
}

function metaLine(p) {
  return [p.authors, p.year].filter(Boolean).join(', ');
}

function paperLinks(p) {
  const out = [];
  if (p.arxiv) out.push({ name: 'arXiv', url: p.arxiv });
  if (p.doi) out.push({ name: 'DOI', url: p.doi });
  if (p.pdf) out.push({ name: 'PDF', url: p.pdf });
  return out;
}

function renderPaper(p, context) {
  const meta = metaLine(p);
  const links = paperLinks(p);
  return `
    <div class="paper${p.done ? ' read' : ''}">
      <div class="paper-line">
        <div class="paper-check${p.done ? ' checked' : ''}"></div>
        <div class="paper-body">
          ${context ? `<div class="search-result-folder">${esc(context)}</div>` : ''}
          <div class="paper-title">${esc(p.title)}</div>
          ${meta ? `<div class="paper-meta">${esc(meta)}</div>` : ''}
          ${links.length ? `<div class="paper-links">${links.map(l => `<a href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.name)} ↗</a>`).join('')}</div>` : ''}
          ${p.note ? `<div class="paper-note">${esc(p.note)}</div>` : ''}
        </div>
      </div>
    </div>
  `;
}

function renderStats() {
  const total = PAPERS.length;
  const read = PAPERS.filter(p => p.done).length;
  document.getElementById('page-stats').textContent = `${read}/${total} read · ${FOLDERS.length} folders`;
}

function renderOverview() {
  const html = `
    <div class="folder-list">
      ${FOLDERS.map(folder => {
        const papers = papersInFolder(folder);
        const total = papers.length;
        const read = papers.filter(p => p.done).length;
        const dotCount = Math.min(Math.max(total, 1), 20);
        const dotsRead = total === 0 ? 0 : Math.round((read / total) * dotCount);
        let dots = '';
        for (let k = 0; k < dotCount; k++) {
          dots += `<span class="progress-dot${k < dotsRead ? ' read' : ''}"></span>`;
        }
        return `
          <div class="folder-row" data-folder="${esc(folder)}">
            <div class="folder-name">${esc(folder)}</div>
            <div class="folder-progress">${dots}</div>
            <div class="folder-count">${read}/${total}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
  const c = document.getElementById('content');
  c.innerHTML = html;
  c.querySelectorAll('.folder-row').forEach(row => {
    row.addEventListener('click', () => showFolder(row.dataset.folder));
  });
}

function showFolder(folder) {
  const papers = papersInFolder(folder);
  const total = papers.length;
  const read = papers.filter(p => p.done).length;
  const groups = groupBySubsection(papers);
  const html = `
    <div class="folder-header">
      <button class="back-btn" id="back-btn">← all folders</button>
      <h2 class="folder-title">${esc(folder)}</h2>
      <div class="folder-stats">${read}/${total}</div>
    </div>
    ${papers.length === 0 ? '<div class="state">No papers yet.</div>' :
      groups.map(g => `
        <section class="subsection">
          ${g.name ? `<h3 class="subsection-title">${esc(g.name)}</h3>` : ''}
          ${g.papers.map(p => renderPaper(p)).join('')}
        </section>
      `).join('')
    }
  `;
  const c = document.getElementById('content');
  c.innerHTML = html;
  document.getElementById('back-btn').addEventListener('click', () => {
    document.getElementById('search-input').value = '';
    renderOverview();
  });
  window.scrollTo(0, 0);
}

function renderSearch(q) {
  const ql = q.toLowerCase();
  const results = PAPERS.filter(p => {
    const hay = [p.title, p.authors, p.note, p.folder, p.subsection].filter(Boolean).join(' ').toLowerCase();
    return hay.includes(ql);
  });
  const html = `
    <div class="search-meta">${results.length} result${results.length === 1 ? '' : 's'} for "${esc(q)}"</div>
    ${results.map(p => {
      const context = p.subsection ? `${p.folder} / ${p.subsection}` : p.folder;
      return renderPaper(p, context);
    }).join('')}
  `;
  document.getElementById('content').innerHTML = html;
}

document.getElementById('search-input').addEventListener('input', e => {
  const q = e.target.value.trim();
  if (!q) renderOverview();
  else renderSearch(q);
});

renderStats();
renderOverview();
